<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindWell</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#22c55e,#16a34a);
}

/* Container */

.container{
background:white;
padding:45px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
width:420px;
}

/* Logo */

.logo{
font-size:24px;
font-weight:600;
color:#16a34a;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:30px;
}

/* Cards */

.options{
display:flex;
gap:20px;
justify-content:center;
}

.card{
flex:1;
padding:25px;
border-radius:14px;
border:1px solid #eee;
cursor:pointer;
transition:0.25s;
text-decoration:none;
color:black;
}

.card:hover{
transform:translateY(-4px);
box-shadow:3px 3px 20px black;
}

.card img{
width:50px;
margin-bottom:10px;
}

.card h3{
font-size:18px;
margin-bottom:5px;
}

.card p{
font-size:13px;
color:#64748b;
}

/* Responsive */

@media(max-width:500px){

.container{
width:90%;
}

.options{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">❤ MindWell</div>

<p class="subtitle">
Welcome! Choose how you want to continue
</p>

<div class="options">

<!-- Patient Card -->

<div class="card" onclick="goPatient()">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<h3>Patient</h3>

<p>Access therapy and wellness tools</p>

</div>


<!-- Doctor Card -->

<div class="card" onclick="goDoctor()">

<img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png">

<h3>Doctor</h3>

<p>Manage appointments and patients</p>

</div>

</div>

</div>


<script>

/* Redirect functions */

function goPatient(){
window.location.href="patient/patientlogin.html"
}

function goDoctor(){
window.location.href="doctor/docotorlogin.html"
}

/* Optional hover click animation */

document.querySelectorAll(".card").forEach(card=>{

card.addEventListener("mousedown",()=>{
card.style.transform="scale(0.96)"
})

card.addEventListener("mouseup",()=>{
card.style.transform="translateY(-4px)"
})

})

</script>

</body>
</html>
