<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Sign Up | MindWell</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#22c55e,#16a34a);
}

.container{
background:white;
padding:40px;
width:400px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
}

.logo{
font-size:22px;
font-weight:600;
color:#16a34a;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

.input-group{
text-align:left;
margin-bottom:15px;
}

.input-group label{
font-size:14px;
margin-bottom:6px;
display:block;
}

.input-group input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#16a34a;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#15803d;
}

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:#16a34a;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">❤ MindWell</div>
<p class="subtitle">Doctor Registration</p>

<form>

<div class="input-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" required>
</div>

<div class="input-group">
<label>Specialization</label>
<input type="text" placeholder="Psychologist / Therapist">
</div>

<div class="input-group">
<label>License Number</label>
<input type="text">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" required>
</div>

<button>Create Doctor Account</button>

</form>

<div class="link">
Already registered? <a href="docotorlogin.html">Doctor Login</a>
</div>

</div>

</body>
</html>
